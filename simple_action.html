<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆笑！お笑いライブ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            overflow: hidden;
            color: #333;
        }

        #stage-container {
            position: relative;
            width: 1000px;
            height: 750px;
            background: #2c3e50;
            /* Wall color */
            border: 10px solid #c0392b;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        /* Wooden Floor */
        #stage-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: linear-gradient(0deg, #5d4037 0%, #8d6e63 100%);
            border-top: 4px solid #3e2723;
            z-index: 2;
            box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        #stage-floor::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 0, 0, 0.1) 40px, rgba(0, 0, 0, 0.1) 45px);
        }

        /* Curtain */
        .curtain {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c, #c0392b);
            z-index: 20;
            transition: transform 1.5s ease-in-out;
        }

        .curtain-left {
            left: 0;
            transform-origin: top left;
        }

        .curtain-right {
            right: 0;
            transform-origin: top right;
        }

        .open .curtain-left {
            transform: translateX(-105%) rotate(-5deg);
        }

        .open .curtain-right {
            transform: translateX(105%) rotate(5deg);
        }

        /* Spotlight */
        .spotlight {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 900px;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 5;
        }

        /* Characters */
        .character {
            position: absolute;
            bottom: 180px;
            /* Adjusted slightly down for more headroom */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 500;
            transition: all 0.8s ease-out;
            animation: idle 3s ease-in-out infinite;
            opacity: 1;
            overflow: visible;
            /* Crucial: show head outside body */
        }

        #partner {
            left: 32%;
            transform: translateX(-300px);
        }

        /* Start off-stage left */
        #player {
            right: 32%;
            transform: translateX(300px);
        }

        /* Start off-stage right */

        .character.ready {
            transform: translateX(0);
        }

        /* Bowing Animation (Rei) */
        @keyframes bow-action {
            0% {
                transform: rotateX(0deg);
            }

            50% {
                transform: rotateX(35deg);
            }

            100% {
                transform: rotateX(0deg);
            }
        }

        .bowing .geinin-body-box {
            animation: bow-action 1.2s ease-in-out;
            transform-origin: bottom center;
        }

        /* Full Body Suit System */
        .geinin-body-box {
            position: relative;
            background: #333;
            border: 3px solid #000;
            border-radius: 20px 20px 5px 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            overflow: visible;
            /* Crucial for absolute positioned children like the head */
        }

        /* Boke: Short and stout in Formal Shikifuku */
        #partner .geinin-body-box {
            width: 150px;
            height: 180px;
            background: #1e272e;
            /* Formal Black */
        }

        /* Tsukkomi: Tall and slim in Formal Shikifuku */
        #player .geinin-body-box {
            width: 100px;
            height: 300px;
            background: #1e272e;
            /* Formal Black */
        }

        /* Formal Shirt Detail (White V-neck) */
        .geinin-body-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 40%;
            background: #fff;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            z-index: 1;
        }

        /* Bow Tie Detail */
        .geinin-body-box::after {
            content: '🎀';
            /* Simple bow tie emoji or stylized shape */
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            z-index: 2;
        }

        /* Legs (Formal Trousers) */
        .leg {
            position: absolute;
            bottom: -60px;
            width: 32px;
            height: 65px;
            background: #1e272e;
            border: 3px solid #000;
            border-top: none;
            border-radius: 0 0 5px 5px;
        }

        .leg-l {
            left: 10%;
        }

        .leg-r {
            right: 10%;
        }

        /* Shoes */
        .leg::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 45px;
            height: 15px;
            background: #000;
            border-radius: 10px 5px 5px 5px;
        }

        /* Head with Real Face */
        .geinin-head-box {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 110px;
            background: #ffeaa7;
            border: 4px solid #000;
            border-radius: 50%;
            overflow: hidden;
            z-index: 300;
            /* HIGH: Must be above shirt collar and bubble BASE */
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .geinin-head-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes idle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Floor shadow */
        .character::after {
            content: '';
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            filter: blur(10px);
            border-radius: 50%;
            z-index: -1;
        }

        /* Tsukkomi */

        /* Mic Stand */
        #mic {
            position: absolute;
            bottom: 170px;
            /* Matched to geinin ground level */
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 250px;
            background: #95a5a6;
            z-index: 100;
            /* In front of geinin slightly */
            border: 2px solid #333;
        }

        #mic::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -15px;
            width: 40px;
            height: 40px;
            background: #bdc3c7;
            border-radius: 50%;
            border: 4px solid #7f8c8d;
        }

        /* Speech Bubbles - Attached to characters */
        .bubble {
            position: absolute;
            top: -280px;
            /* Moved even higher to avoid ANY head collision */
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            font-size: 1.4rem;
            /* Larger for better visibility */
            font-weight: bold;
            z-index: 100;
            /* Ensure it's above curtains and audience */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            max-width: 350px;
            min-width: 220px;
            pointer-events: none;
        }

        .bubble.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Boke Bubble (Left/Blue) */
        #partner-bubble {
            background: #fff9c4;
            /* Yellow for setup */
        }

        #partner-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #333 transparent;
            display: block;
            width: 0;
        }

        /* Tsukkomi Bubble (Right/Red) */
        #player-bubble {
            background: #fff;
        }

        #player-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #333 transparent;
            display: block;
            width: 0;
        }

        /* Input Area */
        #input-area {
            position: absolute;
            bottom: -200px;
            /* Hidden initially */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 2000;
            /* HIGHEST Z-INDEX to ensure it's on top */
            transition: bottom 0.3s;
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #333;
        }

        #input-area.active {
            bottom: 30px;
        }

        #joke-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #555;
            border-radius: 5px;
            outline: none;
        }

        #action-btn {
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c0392b;
        }

        #action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Meters */
        #laugh-meter {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            height: 40px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            z-index: 15;
        }

        #laugh-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #e74c3c);
            transition: width 0.5s;
        }

        .laugh-label {
            position: absolute;
            top: 30px;
            right: 340px;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 15;
        }

        /* Feedback Effect */
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 900;
            color: #e74c3c;
            text-shadow: 5px 5px 0 #fff, -5px -5px 0 #fff;
            z-index: 40;
            pointer-events: none;
            transition: transform 0.2s;
        }

        #feedback.show {
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Audience */
        .audience {
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 150px;
            background: repeating-linear-gradient(90deg, #000 0%, #000 20px, transparent 20px, transparent 40px);
            opacity: 0.8;
            z-index: 25;
            mask-image: linear-gradient(to bottom, transparent, black);
        }

        /* Realistic Audience Theater Cut-away */
        #audience-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 3000;
            /* Higher than input-area (2000) to cover entire screen */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in;
            pointer-events: none;
            box-sizing: border-box;
            overflow: hidden;
        }

        #audience-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* TV Program style "LIVE" indicator */
        #audience-overlay::after {
            content: '● LIVE 会場客席';
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            background: rgba(255, 0, 0, 0.8);
            padding: 5px 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            z-index: 210;
        }

        /* Variety Show Telop (Caption) */
        .variety-telop {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            font-weight: 900;
            font-size: 4rem;
            color: #f1c40f;
            -webkit-text-stroke: 3px #000;
            text-shadow: 4px 4px 0px #e74c3c;
            z-index: 220;
            opacity: 0;
            transform: translateX(-50%) scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #audience-overlay.show .variety-telop {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .audience-row {
            display: flex;
            justify-content: center;
            width: 150%;
            /* Wider than screen for perspective */
            margin-bottom: -40px;
        }

        .audience-member {
            position: relative;
            width: 110px;
            height: 140px;
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Dark theater seats */
        .audience-seat {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 60px;
            background: #2c3e50;
            border-top: 5px solid #34495e;
            border-radius: 10px 10px 0 0;
            z-index: 10;
        }

        .audience-face {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            overflow: hidden;
            z-index: 20;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            animation: audience-laugh-shake 0.2s ease-in-out infinite;
        }

        .audience-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(1.1);
        }

        /* Floating Laugh Particles */
        .laugh-text {
            position: absolute;
            color: #f1c40f;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px #000;
            white-space: nowrap;
            z-index: 40;
            pointer-events: none;
            animation: float-laugh 1.5s ease-out forwards;
        }

        @keyframes float-laugh {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1.2) rotate(10deg);
                opacity: 0;
            }
        }

        /* Row perspective and lighting */
        .audience-row:nth-child(1) {
            transform: scale(0.5) translateY(-100px);
            filter: brightness(0.4);
            z-index: 5;
        }

        .audience-row:nth-child(2) {
            transform: scale(0.65) translateY(-70px);
            filter: brightness(0.6);
            z-index: 10;
        }

        .audience-row:nth-child(3) {
            transform: scale(0.8) translateY(-40px);
            filter: brightness(0.8);
            z-index: 15;
        }

        .audience-row:nth-child(4) {
            transform: scale(1);
            filter: brightness(1.1);
            z-index: 20;
        }

        @keyframes audience-laugh-shake {
            0% {
                transform: scale(1) rotate(0deg);
            }

            50% {
                transform: scale(1.05) rotate(2deg);
            }

            100% {
                transform: scale(1) rotate(-1deg);
            }
        }

        @keyframes audience-sway {
            from {
                transform: rotate(-2deg);
            }

            to {
                transform: rotate(2deg);
            }
        }

        .audience-member {
            animation: audience-sway 5s ease-in-out infinite alternate;
        }

        /* Stage glare overlay */
        .stage-glare {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(241, 196, 15, 0.2) 0%, transparent 100%);
            z-index: 100;
            pointer-events: none;
        }

        @keyframes audience-move {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-5px);
            }
        }

        /* Judges Panel CSS (Simplified) */
        #judges-panel {
            position: absolute;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            display: flex;
            justify-content: space-around;
            background: rgba(20, 20, 20, 0.9);
            border: 3px solid #f1c40f;
            padding: 20px;
            border-radius: 15px;
            z-index: 50;
            transition: bottom 0.5s;
        }

        #judges-panel.visible {
            bottom: 50px;
        }

        .judge {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            width: 80px;
        }

        .judge-face {
            display: none;
            /* Keep face photos hidden as requested before */
        }

        .judge-name {
            display: flex;
            /* Show names again */
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            height: 2.4em;
            align-items: center;
            justify-content: center;
            color: #f1c40f;
        }

        .score-board {
            width: 70px;
            height: 50px;
            background: #000;
            color: #e74c3c;
            font-family: 'Courier New', monospace;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #555;
        }

        #final-result {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 60;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #final-result.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .total-score {
            font-size: 3rem;
            color: #c0392b;
            font-weight: 900;
        }

        .rank-text {
            font-size: 2rem;
            color: #333;
            margin-top: 10px;
        }

        #group-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #f1c40f;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #f1c40f;
            z-index: 10;
        }

        /* Final Battle UI */
        #final-battle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        #final-battle-overlay.show {
            display: flex;
        }

        .rival-card {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 30px;
        }

        .rival {
            text-align: center;
            width: 150px;
            padding: 20px;
            border: 3px solid #555;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .rival.active {
            border-color: #f1c40f;
            box-shadow: 0 0 20px #f1c40f;
        }

        .vote-count {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .voter-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            min-height: 40px;
        }

        .voter-icon {
            font-size: 1.5rem;
        }

        /* Tsukkomi Score Popup */
        #tsukkomi-score {
            position: absolute;
            top: 180px;
            right: 12%;
            z-index: 150;
            opacity: 0;
            transform: scale(0.5) rotate(-15deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 15px rgba(241, 196, 15, 0.6));
        }

        #tsukkomi-score.show {
            opacity: 1;
            transform: scale(1) rotate(5deg);
        }

        .score-level {
            font-size: 1.2rem;
            color: #fff;
            background: #e67e22;
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: 800;
            margin-bottom: -10px;
            z-index: 2;
            box-shadow: 2px 2px 0 #000;
        }

        .score-val {
            font-size: 6rem;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            margin: 0;
            line-height: 1;
        }

        .score-rank {
            font-size: 1.8rem;
            background: #000;
            color: #fff;
            padding: 5px 20px;
            border-radius: 30px;
            margin-top: -15px;
            font-weight: bold;
            border: 3px solid #f1c40f;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="stage-container">
        <!-- Curtains -->
        <div class="curtain curtain-left" id="c-left"></div>
        <div class="curtain curtain-right" id="c-right"></div>

        <div id="stage-floor"></div>
        <div class="spotlight"></div>
        <div class="laugh-label">爆笑度</div>
        <div id="laugh-meter">
            <div id="laugh-fill"></div>
        </div>

        <div id="feedback">ドッカン！</div>
        <div id="tsukkomi-score">
            <span class="score-level">LV.5</span>
            <span class="score-val">85</span>
            <span class="score-rank">キレッキレ！</span>
        </div>
        <div id="group-tag">コンビ名：たける</div>

        <!-- Final Battle Overlay -->
        <div id="final-battle-overlay">
            <h1 style="font-size: 3rem; color: #f1c40f; text-shadow: 0 0 10px #f1c40f;">最終決戦 (THE FINAL)</h1>
            <p style="font-size: 1.2rem;">審査員7名による決選投票開始！</p>

            <div class="rival-card">
                <div class="rival" id="rival-takeru">
                    <div style="font-size: 1.5rem;">たける</div>
                    <div class="voter-icons" id="votes-takeru"></div>
                    <div class="vote-count" id="count-takeru">0</div>
                </div>
                <div class="rival" id="rival-kakeru">
                    <div style="font-size: 1.5rem;">かける</div>
                    <div class="voter-icons" id="votes-kakeru"></div>
                    <div class="vote-count" id="count-kakeru">0</div>
                </div>
                <div class="rival" id="rival-wataru">
                    <div style="font-size: 1.5rem;">わたる</div>
                    <div class="voter-icons" id="votes-wataru"></div>
                    <div class="vote-count" id="count-wataru">0</div>
                </div>
            </div>

            <div id="battle-result" style="margin-top: 50px; font-size: 2.5rem; font-weight: bold; min-height: 1.5em;">
            </div>
            <button id="restart-btn" onclick="location.reload()"
                style="display:none; padding: 10px 30px; font-size: 1.5rem; cursor:pointer; margin-top: 20px;">もう一度挑戦する</button>
        </div>


        <div id="partner" class="character">
            <div id="partner-bubble" class="bubble">...</div>
            <div class="geinin-body-box">
                <div class="geinin-head-box">
                    <img src="https://randomuser.me/api/portraits/men/14.jpg" alt="Partner Face">
                </div>
                <div class="leg leg-l"></div>
                <div class="leg leg-r"></div>
            </div>
        </div>

        <div id="mic"></div>

        <div id="player" class="character">
            <div id="player-bubble" class="bubble">...</div>
            <div class="geinin-body-box">
                <div class="geinin-head-box">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Player Face">
                </div>
                <div class="leg leg-l"></div>
                <div class="leg leg-r"></div>
            </div>
        </div>

        <div id="audience-overlay">
            <div class="stage-glare"></div>
            <div class="variety-telop" id="audience-telop">ドッカン！</div>
            <div id="audience-scroller"></div>
        </div>

        <div class="audience"></div>

        <div id="input-area">
            <div id="speaker-label"
                style="color: #fff; font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 10px; display: inline-block;">
                ボケの台詞を入力</div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="joke-input" placeholder="面白いボケを入力してや！" autocomplete="off">
                <button id="action-btn" onclick="handleSubmit()">話す</button>
            </div>
        </div>

        <div id="judges-panel"></div>
        <div id="final-result">
            <h2>最終得点</h2>
            <div class="total-score" id="total-points">---</div>
            <div class="rank-text" id="rank-msg"></div>
            <button id="retry-btn" onclick="location.reload()"
                style="margin-top:20px; padding:10px 20px; font-size:1.5rem; cursor:pointer;">次の出番へ</button>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage-container');
        const cLeft = document.getElementById('c-left');
        const cRight = document.getElementById('c-right');

        const partnerBubble = document.getElementById('partner-bubble');
        const playerBubble = document.getElementById('player-bubble');

        const inputArea = document.getElementById('input-area'); // Changed from choicesArea
        const jokeInput = document.getElementById('joke-input'); // New input
        const laughFill = document.getElementById('laugh-fill');
        const feedbackEl = document.getElementById('feedback');
        const partnerEl = document.getElementById('partner');
        const playerEl = document.getElementById('player');
        const actionBtn = document.getElementById('action-btn');

        let laughScore = 50;
        let currentLineIndex = 0;
        let currentSpeaker = 'boke'; // 'boke' or 'tsukkomi'
        let lastBokeText = "";
        let sessionScores = []; // Track all tsukkomi scores
        let lastAudienceTime = 0; // Fixed: Track audience reveal timing

        // Fully Dynamic Topic Generation System
        let currentTopic = "game";
        let usedContext = [];

        function generateDynamicBoke(retort) {
            // Context-aware Boke Generator
            if (!retort) return "どうもー！適当コンビです！今日もオカンがな、あるものの名前忘れたらしくてね。";

            if (retort.includes("ポケモン") || retort.includes("時代")) {
                return "せやった！ポケモンは俺らの時代の話やったな！ほなオカンが言うてたんは、もっと古い「メンコ」とかの話なんかな？";
            }
            if (retort.includes("何") || retort.includes("それ")) {
                return "何かって言われたら困るけどな、見た目は丸くて、触るとぷにぷにしてるらしいわ。";
            }
            if (retort.includes("泥棒") || retort.includes("犯罪")) {
                return "人聞き悪いわ！オカンは「心の隙間を埋めてる」言うてたわ。そのために夜中にバール持って歩いてるらしいねん。";
            }
            if (retort.includes("違う") || retort.includes("ちゃう")) {
                return "違うんか！ほな、もっとキラキラした、女子高生に人気のある「漬物」の話なんかな？";
            }

            // Random Pivot based on retort length or keywords
            const randomPivots = [
                `お前が「${retort}」って言うから思い出したわ！その作品、空から「たこ焼き」が降ってくるシーンがあるらしいねん。`,
                "そうそう、その感じや！でもな、オカンが言うには「主食がプロテイン」の物語らしいわ.",
                "いや、それより聞いてや。その主人公、移動手段が「セグウェイ」らしいねん."
            ];
            return randomPivots[Math.floor(Math.random() * randomPivots.length)];
        }

        const speakerLabel = document.getElementById('speaker-label');

        /* Listen for Enter key */
        jokeInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleSubmit();
            }
        });

        function startShow() {
            currentLineIndex = 0;
            currentSpeaker = 'boke';
            inputArea.classList.remove('active');
            updateUIForSpeaker();

            setTimeout(() => {
                stage.classList.add('open');
                setTimeout(() => {
                    // Make geinin walk in
                    partnerEl.classList.add('ready');
                    playerEl.classList.add('ready');

                    // Formal Bow (Rei) after walking in
                    setTimeout(() => {
                        partnerEl.classList.add('bowing');
                        playerEl.classList.add('bowing');

                        // Clear bowing class after animation finishes
                        setTimeout(() => {
                            partnerEl.classList.remove('bowing');
                            playerEl.classList.remove('bowing');
                        }, 1200);
                    }, 1000);

                    setTimeout(() => {
                        inputArea.classList.add('active');
                        jokeInput.focus();
                    }, 2500);
                }, 1000);
            }, 500);
            updateMeter();

            // Initialize audience overlay content (Realistic People in Theater)
            const scroller = document.getElementById('audience-scroller');
            scroller.innerHTML = '';

            for (let r = 0; r < 4; r++) {
                const row = document.createElement('div');
                row.className = 'audience-row';
                const count = 8 + r * 2;
                for (let i = 0; i < count; i++) {
                    const member = document.createElement('div');
                    member.className = 'audience-member';
                    member.style.animationDelay = `${Math.random() * 0.5}s`;

                    // Real Human Face Portals (Selection of high-quality thumbnails)
                    const gender = Math.random() > 0.5 ? 'men' : 'women';
                    const userId = Math.floor(Math.random() * 70);
                    const imgUrl = `https://randomuser.me/api/portraits/${gender}/${userId}.jpg`;

                    member.innerHTML = `
                        <div class="audience-face"><img src="${imgUrl}" alt="Laughing Audience"></div>
                        <div class="audience-seat"></div>
                        <div class="stage-reflection"></div>
                    `;
                    row.appendChild(member);
                }
                scroller.appendChild(row);
            }
        }

        function revealAudience(score) {
            const overlay = document.getElementById('audience-overlay');
            const telop = document.getElementById('audience-telop');
            const scroller = document.getElementById('audience-scroller');

            let telopText = "";
            let animSpeed = "0.2s";

            if (score > 85) {
                telopText = "ドッカン！爆笑！！";
                scroller.style.filter = "brightness(1.2)";
                animSpeed = "0.15s";
            } else if (score >= 40) {
                telopText = "ウケた！";
                scroller.style.filter = "brightness(1)";
                animSpeed = "0.4s";
            } else {
                telopText = "シーン...";
                scroller.style.filter = "brightness(0.5) sepia(0.5)";
                animSpeed = "0s"; // Stop shaking
            }

            telop.innerText = telopText;

            // Adjust animation for all members
            document.querySelectorAll('.audience-face').forEach(face => {
                face.style.animationDuration = animSpeed;
            });

            overlay.classList.add('show');
            setTimeout(() => {
                overlay.classList.remove('show');
            }, 2500);
        }

        function updateUIForSpeaker() {
            if (currentSpeaker === 'boke') {
                speakerLabel.innerText = "ボケの台詞を入力";
                speakerLabel.style.background = "#f1c40f";
                speakerLabel.style.color = "#000";
                jokeInput.placeholder = "面白いボケを入力してや！";
                actionBtn.innerText = "ボケる！";
            } else {
                speakerLabel.innerText = "ツッコミを入力";
                speakerLabel.style.background = "#e74c3c";
                speakerLabel.style.color = "#fff";
                jokeInput.placeholder = "キレのあるツッコミを！";
                actionBtn.innerText = "突っ込む！";
            }
            jokeInput.value = "";
            jokeInput.focus();
        }

        function handleSubmit() {
            const text = jokeInput.value.trim();
            if (!text) return;

            if (currentSpeaker === 'boke') {
                submitBoke(text);
            } else {
                submitTsukkomi(text);
            }
        }

        function submitBoke(text) {
            lastBokeText = text;
            playerBubble.classList.remove('visible'); // Clear old tsukkomi
            showBubble(partnerBubble, text);

            // Boke Animation
            const p = document.getElementById('partner');
            p.style.animation = "none";
            p.style.transform = "scale(1.1) rotate(-8deg) translateY(-20px)";
            setTimeout(() => {
                p.style.transform = "scale(1) rotate(0) translateY(0)";
                p.style.animation = "idle 3s ease-in-out infinite";
            }, 600);

            currentSpeaker = 'tsukkomi';
            updateUIForSpeaker();
        }

        function submitTsukkomi(retort) {
            // Check for ending the show
            if (retort.match(/もうええわ|もういいわ|ありがとうございました|終わろ|ストップ/)) {
                showBubble(playerBubble, retort);
                inputArea.classList.remove('active'); // Hide input
                setTimeout(() => {
                    showBubble(partnerBubble, "もうええわー！ありがとうございましたー！");
                    // Flash feedback
                    showFeedback("ネタ終了！！");
                    setTimeout(endShow, 2000);
                }, 1000);
                return;
            }

            showBubble(playerBubble, retort);

            // Tsukkomi Animation
            const pl = document.getElementById('player');
            pl.style.animation = "none";
            pl.style.transform = "translateX(-40px) rotate(-15deg) scale(1.1) translateY(-15px)";
            setTimeout(() => {
                pl.style.transform = "translateX(0) rotate(0) scale(1) translateY(0)";
                pl.style.animation = "idle 3s ease-in-out infinite";
            }, 400);

            // --- Check if this is a "Scoring Tsukkomi" ---
            // Only evaluate if it contains '!' or '！'
            const isScoring = retort.includes('！') || retort.includes('!');

            if (isScoring) {
                // --- "Real Funniness" Judging Logic ---
                const bokeTextLower = lastBokeText.toLowerCase();
                const retortLower = retort.toLowerCase();
                let score = 25; // Base score (Neutral)

                // 1. Keyword Correlation (Logical connection)
                const bokeKeywords = bokeTextLower.match(/[一-龠ぁ-んァ-ヶ]{2,}/g) || [];
                let matchCount = 0;
                bokeKeywords.forEach(kw => {
                    if (retortLower.includes(kw)) matchCount++;
                });
                score += Math.min(matchCount * 25, 70); // High reward for connecting the dots

                // 2. Artistic Tsukkomi Patterns (Classic comedy style)
                const patterns = [
                    { reg: /なんでやねん|どないやねん|何してんねん|おかしいやろ/, bonus: 25 },
                    { reg: /やかましい|うるさい|黙れ|ええ加減にしろ|ボケ倒すな/, bonus: 20 },
                    { reg: /関係ないわ|知らんわ|誰がや|嘘つけ|違うわ/, bonus: 15 },
                    { reg: /！|!|？|\?/, bonus: 10 },
                    { reg: /やん|ねん|やろ|な！|か！/, bonus: 12 }
                ];

                patterns.forEach(p => {
                    if (retortLower.match(p.reg)) score += p.bonus;
                });

                // 3. Sentence Structure & Length
                if (retort.length >= 6 && retort.length <= 25) score += 15; // "Just right" length
                if (retort.length < 3) score -= 20; // Too brief is lazy

                // 4. Critical Penalty (Boring reaction / Repetition)
                if (retortLower.match(/へー|そうなんだ|なるほど|ふーん|へぇ|そっか|あそう|はい/)) score -= 60;

                // Penalty for exactly repeating the Boke's words (Mimicry)
                if (lastBokeText.length > 5 && retortLower.includes(bokeTextLower)) score -= 40;

                // 5. Minimal natural variance
                score += Math.floor(Math.random() * 10);

                // Final Clamp
                score = Math.min(100, Math.max(0, score));

                // --- Display Score to User ---
                const scoreVal = document.querySelector('.score-val');
                const scoreRank = document.querySelector('.score-rank');
                const scoreLevel = document.querySelector('.score-level');
                const scorePop = document.getElementById('tsukkomi-score');

                let rank = "普通やな";
                let level = 2;
                if (score >= 95) { rank = "【神回】伝説のツッコミ"; level = 5; }
                else if (score >= 90) { rank = "天才！神がかってんな！"; level = 5; }
                else if (score >= 80) { rank = "キレッキレやん！"; level = 4; }
                else if (score >= 60) { rank = "なかなかええやん"; level = 3; }
                else if (score >= 40) { rank = "まあ普通やな"; level = 2; }
                else if (score >= 20) { rank = "ちょっと寒いか？"; level = 1; }
                else { rank = "意味不明やわ！"; level = 0; }

                scoreVal.innerText = Math.floor(score);
                scoreRank.innerText = rank;
                scoreLevel.innerText = `LV.${level}`;
                scorePop.classList.add('show');
                setTimeout(() => {
                    scorePop.classList.remove('show');
                }, 1800);

                // Update overall performance tracking
                sessionScores.push(score);

                // Calculate current average/weighted laugh score
                const avgScore = sessionScores.reduce((a, b) => a + b, 0) / sessionScores.length;
                laughScore = Math.floor((avgScore + score) / 2); // Mix of average and latest impact
                updateMeter();

                // Reaction based on score
                if (score > 85) showFeedback("ドッカン！");
                else if (score > 60) showFeedback("ウケてる！");
                else if (score < 30) showFeedback("シーン...");

                revealAudience(score); // Show audience with the calculated score
            } else {
                // Just normal talking, no audience reveal
            }

            currentSpeaker = 'boke';
            setTimeout(updateUIForSpeaker, 2000);
        }

        function showBubble(el, text) {
            el.innerText = text;
            el.classList.add('visible');
        }

        function showFeedback(text) {
            feedbackEl.innerText = text;
            feedbackEl.classList.add('show');
            setTimeout(() => feedbackEl.classList.remove('show'), 1000);
        }

        function updateMeter() {
            laughFill.style.width = laughScore + '%';
            if (laughScore > 80) laughFill.style.background = 'linear-gradient(90deg, #ff9ff3, #f368e0)';
            else if (laughScore < 30) laughFill.style.background = '#333';
            else laughFill.style.background = 'linear-gradient(90deg, #f1c40f, #e74c3c)';
        }

        function endShow() {
            partnerBubble.classList.remove('visible');
            playerBubble.classList.remove('visible');
            document.getElementById('tsukkomi-score').classList.remove('show'); // Ensure score pop is hidden
            feedbackEl.innerText = "ネタ終了！審査発表！";
            feedbackEl.classList.add('show');


            // Get Elements
            const panel = document.getElementById('judges-panel');
            const resultBox = document.getElementById('final-result');

            // Generate content
            panel.innerHTML = '';
            // Back to 9 judges
            const judgesCount = 9;
            let total = 0;

            setTimeout(() => { panel.classList.add('visible'); }, 500);

            // Use session average for final judging base
            const finalAverage = sessionScores.length > 0
                ? sessionScores.reduce((a, b) => a + b, 0) / sessionScores.length
                : 50;

            for (let i = 0; i < judgesCount; i++) {
                const div = document.createElement('div');
                div.className = 'judge';

                // Refined Judge Scoring Logic based on tiers:
                let s;
                if (finalAverage < 45) {
                    s = 80 + Math.floor(Math.random() * 8);
                } else if (finalAverage < 70) {
                    s = 88 + Math.floor(Math.random() * 3);
                } else if (finalAverage < 88) {
                    s = 91 + Math.floor(Math.random() * 4);
                } else if (finalAverage < 98) {
                    s = 95 + Math.floor(Math.random() * 5);
                } else {
                    s = 100;
                }

                div.innerHTML = `
                    <div class="judge-name">審査員${i + 1}</div>
                    <div class="score-board" id="score-${i}">??</div>
                `;
                panel.appendChild(div);

                // Animate Score Reveal
                setTimeout(() => {
                    const sb = document.getElementById(`score-${i}`);
                    sb.innerText = s;

                    const val = parseInt(sb.innerText);
                    total += val;
                    sb.style.color = val >= 95 ? "#e74c3c" : (val >= 91 ? "#f1c40f" : "#fff");
                    sb.style.transform = "scale(1.2)";
                    setTimeout(() => sb.style.transform = "scale(1)", 200);
                }, 1500 + i * 800);
            }

            // Show Final Result
            setTimeout(() => {
                const totalEl = document.getElementById('total-points');
                const rankEl = document.getElementById('rank-msg');
                const resultBox = document.getElementById('final-result');

                let current = 0;
                const interval = setInterval(() => {
                    current += 7;
                    if (current >= total) {
                        current = total;
                        clearInterval(interval);

                        // Thresholds adjusted for 9 judges:
                        // 658+ (Avg 94+) = Final Battle (Legendary range)
                        // 630+ (Avg 90+) = Close
                        if (total >= 658) {
                            rankEl.innerHTML = "<span style='color:#e74c3c'>伝説の領域！！最終決戦へ！</span><br><button onclick='startFinalBattle()' style='margin-top:10px; padding:5px 15px; cursor:pointer;'>最終決戦へ</button>";
                        } else if (total >= 630) {
                            rankEl.innerText = "面白い！が、あと少し何かが足りない！";
                        } else {
                            rankEl.innerText = "まだまだ修行が必要やな...";
                        }
                    }
                    totalEl.innerText = current + "点";
                }, 20);

                resultBox.classList.add('show');
            }, 1000 + judgesCount * 800 + 500);
        }

        function startFinalBattle() {
            document.getElementById('final-result').classList.remove('show');
            const overlay = document.getElementById('final-battle-overlay');
            overlay.classList.add('show');

            const Rivals = ['takeru', 'kakeru', 'wataru'];
            const anonymousJudgesCount = 9;
            let votes = { takeru: 0, kakeru: 0, wataru: 0 };

            for (let i = 0; i < anonymousJudgesCount; i++) {
                setTimeout(() => {
                    // Logic: Merit-based voting (No guaranteed win)
                    let pool = ['takeru', 'kakeru', 'wataru'];
                    if (laughScore > 85) pool.push('takeru', 'takeru');
                    else if (laughScore < 45) pool.push('kakeru', 'wataru', 'kakeru', 'wataru');

                    const choice = pool[Math.floor(Math.random() * pool.length)];
                    votes[choice]++;

                    const iconWrap = document.getElementById(`votes-${choice}`);
                    const span = document.createElement('span');
                    span.className = 'voter-icon';
                    span.style.width = '20px';
                    span.style.height = '20px';
                    span.style.display = 'inline-block';
                    span.style.borderRadius = '50%';
                    span.style.background = '#f1c40f'; // Simple color instead of photo
                    span.style.border = '1px solid #fff';
                    iconWrap.appendChild(span);

                    document.getElementById(`count-${choice}`).innerText = votes[choice];

                    // Highlight current leader or voter's choice
                    document.querySelectorAll('.rival').forEach(r => r.classList.remove('active'));
                    document.getElementById(`rival-${choice}`).classList.add('active');

                    // If last vote
                    if (i === anonymousJudgesCount - 1) {
                        setTimeout(() => showWinner(votes), 1000);
                    }
                }, 1000 + i * 1200);
            }
        }

        function showWinner(votes) {
            const resEl = document.getElementById('battle-result');
            const btn = document.getElementById('restart-btn');

            let winner = 'takeru';
            if (votes.kakeru > votes.takeru && votes.kakeru > votes.wataru) winner = 'kakeru';
            if (votes.wataru > votes.takeru && votes.wataru > votes.kakeru) winner = 'wataru';

            if (winner === 'takeru') {
                resEl.innerHTML = "🏆 優勝：たける！！ 🏆<br><span style='font-size:1.5rem'>おめでとう！伝説の称号を獲得したで！</span>";
                resEl.style.color = "#f1c40f";
            } else {
                const names = { kakeru: 'かける', wataru: 'わたる' };
                resEl.innerHTML = `優勝：${names[winner]}...<br><span style='font-size:1.5rem'>残念！来年は絶対勝とうな！</span>`;
                resEl.style.color = "#bdc3c7";
            }
            btn.style.display = "block";
        }


        window.onload = startShow;
    </script>
</body>
