<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the World | Globe Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg: #0b0e14;
            --text: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Outfit', 'Hiragino Kaku Gothic ProN', sans-serif;
            color: var(--text);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stats {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            margin: 5px 0;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .controls-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0.6;
            animation: fadeInOut 2s infinite;
        }

        @keyframes fadeInOut {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(11, 14, 20, 0.8) 0%, rgba(11, 14, 20, 1) 100%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }

        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.5);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 30;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-over.visible {
            display: flex;
        }

        .score-display {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div class="start-screen" id="start-screen">
        <h1>GLOBE RUNNER</h1>
        <p style="margin-bottom: 40px; opacity: 0.8;">Around the World in a Rolling Ball</p>
        <button class="btn-start" id="start-btn">BEGIN JOURNEY</button>
    </div>

    <div class="ui-overlay">
        <div class="header">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">DISTANCE</div>
                    <div class="stat-value" id="dist-val">0 km</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">LAPS</div>
                    <div class="stat-value" id="laps-val">0</div>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">SPEED</div>
                    <div class="stat-value" id="speed-val">0 km/h</div>
                </div>
            </div>
        </div>
        <div class="controls-hint">
            USE ← → ARROWS OR A D TO STEER
        </div>
    </div>

    <div class="game-over" id="game-over">
        <h2 style="font-size: 3rem; margin-bottom: 10px;">JOURNEY ENDED</h2>
        <div class="score-display" id="final-score">Distance: 0 km</div>
        <button class="btn-start" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/math/MeshSurfaceSampler.js"></script>
    <script src="world_ball.js"></script>
</body>

</html>
